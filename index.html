<style>
  :root {
    --sand: #FBF4EA;
    --blue: #0076CE;
    --orange: #F15A29;
    --yellow: #FFD54F;
    --red: #E53935;
    --black: #1C1C1C;
    --white: #FFFFFF;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--sand);
    color: var(--black);
    font-family: 'Nunito Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ── GRAIN TEXTURE ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 100;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px 200px;
  }

  /* ── PAGE LAYOUT ── */
  .page {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    position: relative;
  }



  /* ── HEADER ── */
  header {
    padding: 28px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
    z-index: 10;
  }

  .header-logo img {
    height: 28px;
    width: auto;
    display: block;
  }

  .header-email {
    font-size: 13px;
    font-weight: 500;
    color: var(--black);
    opacity: 0.4;
    text-decoration: none;
    transition: opacity 0.3s;
    letter-spacing: 0.01em;
  }
  .header-email:hover { opacity: 0.8; }

  /* ── HERO ── */
  .hero {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 0 24px 80px;
    position: relative;
    z-index: 5;
  }

  /* Three animated dots */
  .dots {
    display: flex;
    gap: 10px;
    margin-bottom: 52px;
    animation: dotsContainer 0.8s ease-out 0.2s both;
  }
  .dots span {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    display: block;
    animation: dotBounce 1.8s ease-in-out infinite;
  }
  .dots span:nth-child(1) {
    background: var(--orange);
    animation-delay: 0s;
  }
  .dots span:nth-child(2) {
    background: var(--blue);
    animation-delay: 0.2s;
  }
  .dots span:nth-child(3) {
    background: var(--yellow);
    animation-delay: 0.4s;
  }

  .hero-logo {
    margin-bottom: 32px;
    animation: fadeUp 0.8s ease-out 0.4s both;
  }
  .hero-logo img {
    height: clamp(44px, 7vw, 72px);
    width: auto;
  }

  .hero-copy {
    font-family: 'Nunito Sans', sans-serif;
    font-size: clamp(15px, 2.2vw, 19px);
    font-weight: 400;
    color: var(--black);
    opacity: 0.45;
    max-width: 380px;
    line-height: 1.7;
    margin-bottom: 52px;
    animation: fadeUp 0.8s ease-out 0.6s both;
    letter-spacing: 0.01em;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    background: var(--white);
    border: 1.5px solid rgba(28,28,28,0.06);
    border-radius: 100px;
    padding: 11px 26px;
    font-family: 'Poppins', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--black);
    letter-spacing: 0.03em;
    animation: fadeUp 0.8s ease-out 0.8s both;
    box-shadow: 0 2px 16px rgba(0,0,0,0.04);
  }
  .badge-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--orange);
    animation: pulse 2.2s ease-in-out infinite;
  }

  /* ── FOOTER ── */
  footer {
    padding: 28px 40px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    position: relative;
    z-index: 10;
    flex-wrap: wrap;
    gap: 16px;
  }

  .footer-left {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .footer-brand {
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 14px;
    color: var(--black);
    opacity: 0.25;
  }
  .footer-copy {
    font-size: 12px;
    color: var(--black);
    opacity: 0.22;
    letter-spacing: 0.02em;
  }

  .footer-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 3px;
  }
  .footer-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--black);
    opacity: 0.22;
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }
  .footer-email {
    font-size: 14px;
    font-weight: 500;
    color: var(--blue);
    text-decoration: none;
    transition: opacity 0.3s;
  }
  .footer-email:hover { opacity: 0.65; }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes dotsContainer {
    from { opacity: 0; transform: scale(0.6); }
    to { opacity: 1; transform: scale(1); }
  }
  @keyframes dotBounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }


  /* ── MOBILE ── */
  @media (max-width: 640px) {
    header { padding: 22px 20px; }
    .header-logo img { height: 24px; }
    .header-email { display: none; }
    .hero { padding: 0 20px 48px; }
    .dots { margin-bottom: 40px; gap: 8px; }
    .dots span { width: 8px; height: 8px; }
    .hero-copy { margin-bottom: 40px; }
    footer {
      padding: 22px 20px;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    .footer-right { align-items: center; }
  }
</style>
</head>
